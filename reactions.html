<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction Predictor & Balancer</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --accent: #e67e22; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 800px; display: grid; grid-template-columns: 1fr 250px; gap: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; }
        .activity-series { background: #fff; padding: 15px; border-radius: 10px; border-left: 5px solid var(--accent); font-size: 0.9rem; }
        .display-area { font-size: 1.8rem; font-weight: bold; margin: 30px 0; min-height: 100px; line-height: 1.5; }
        .answer-area { font-size: 1.4rem; color: var(--secondary); margin-top: 20px; padding: 15px; border-top: 2px dashed #eee; opacity: 0; transition: 0.3s; }
        .visible { opacity: 1; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-gen { background: var(--primary); color: white; }
        .btn-check { background: var(--accent); color: white; grid-column: span 2; }
        button:active { transform: scale(0.98); }
        sub { font-size: 0.6em; position: relative; bottom: -0.2em; }
        @media (max-width: 600px) { .container { grid-template-columns: 1fr; } .activity-series { order: 2; } }
       nav a:hover {
        color: #e67e22 !important; 
        transition: 0.2s;
       }
    </style>
</head>
<body>

    <h2 style="color: var(--primary);">Chemical Reaction Predictor</h2>

    <div class="container">
        <div class="card">
            <div id="mode-label" style="text-transform: uppercase; color: #7f8c8d; font-size: 0.8rem;">Select a reaction type</div>
            <div id="equation-display" class="display-area">Ready to practice?</div>
            <div id="answer-display" class="answer-area"></div>
            
            <div class="controls">
                <button class="btn-gen" onclick="generate('single')">Single Replacement</button>
                <button class="btn-gen" onclick="generate('double')">Double Replacement</button>
                <button class="btn-check" onclick="showAnswer()">Check Answer & Balancing</button>
            </div>
        </div>

        <div class="activity-series">
            <strong>Activity Series</strong><br><br>
            <small>Most Active ↓</small><br>
            Li, K, Ba, Sr, Ca, Na, Mg, Al, Mn, Zn, Cr, Fe, Cd, Co, Ni, Sn, Pb, [H], Cu, Hg, Ag, Pt, Au
            <br><br>
            <strong>Halogens</strong><br>
            F<sub>2</sub> > Cl<sub>2</sub> > Br<sub>2</sub> > I<sub>2</sub>
        </div>
    </div>
<nav style="background:#2c3e50; padding:15px; text-align:center; margin-top: 40px; margin-bottom: 20px; border-radius: 15px; box-shadow: 0 -4px 10px rgba(0,0,0,0.1); width: 80%; max-width: 600px;">
    <a href="index.html" style="color:white; margin:0 20px; text-decoration:none; font-weight:bold; font-family: sans-serif;">Naming & Formulas</a>
    <a href="reactions.html" style="color:white; margin:0 20px; text-decoration:none; font-weight:bold; font-family: sans-serif;">Reaction Practice</a>
</nav>

<script>
    const cations = [
        { n: "Sodium", s: "Na", c: 1 }, { n: "Potassium", s: "K", c: 1 }, { n: "Silver", s: "Ag", c: 1 },
        { n: "Magnesium", s: "Mg", c: 2 }, { n: "Calcium", s: "Ca", c: 2 }, { n: "Zinc", s: "Zn", c: 2 },
        { n: "Barium", s: "Ba", c: 2 }, { n: "Aluminum", s: "Al", c: 3 }, { n: "Iron (III)", s: "Fe", c: 3 },
        { n: "Copper (II)", s: "Cu", c: 2 }, { n: "Lead (II)", s: "Pb", c: 2 }
    ];
    const anions = [
        { n: "Chloride", s: "Cl", c: 1 }, { n: "Bromide", s: "Br", c: 1 }, { n: "Nitrate", s: "NO3", c: 1 },
        { n: "Sulfate", s: "SO4", c: 2 }, { n: "Carbonate", s: "CO3", c: 2 }, { n: "Phosphate", s: "PO4", c: 3 }
    ];
    const series = ["Li", "K", "Ba", "Sr", "Ca", "Na", "Mg", "Al", "Mn", "Zn", "Cr", "Fe", "Cd", "Co", "Ni", "Sn", "Pb", "H", "Cu", "Hg", "Ag", "Pt", "Au"];
    const diatomics = ["H", "N", "O", "F", "Cl", "Br", "I"];

    function gcd(a, b) { return b ? gcd(b, a % b) : a; }
    function lcm(a, b) { return (a * b) / gcd(a, b); }

    function getSubscripts(c1, c2) {
        const common = gcd(c1, c2);
        return { sub1: c2 / common, sub2: c1 / common };
    }

    function makeFormula(cat, ani, coeff = 1) {
        const { sub1, sub2 } = getSubscripts(cat.c, ani.c);
        const cStr = (sub1 > 1 && (cat.s.length > 2 || /\d/.test(cat.s))) ? `(${cat.s})${sub1}` : `${cat.s}${sub1 > 1 ? sub1 : ''}`;
        const aStr = (sub2 > 1 && (ani.s.length > 2 || /\d/.test(ani.s))) ? `(${ani.s})${sub2}` : `${ani.s}${sub2 > 1 ? sub2 : ''}`;
        const cPrefix = coeff > 1 ? coeff : '';
        return cPrefix + cStr + aStr;
    }

    function format(txt) { 
    // This only targets numbers that follow a letter or ')'
    return txt.replace(/([A-Za-z\)])(\d+)/g, '$1<sub>$2</sub>'); 
}

    function generate(type) {
        const display = document.getElementById('equation-display');
        const answer = document.getElementById('answer-display');
        answer.classList.remove('visible');
        
        if(type === 'single') {
            document.getElementById('mode-label').innerText = "Single Replacement";
            const c1 = cations[Math.floor(Math.random() * cations.length)]; // In compound
            const a1 = anions[Math.floor(Math.random() * anions.length)];   // In compound
            const pure = cations[Math.floor(Math.random() * cations.length)]; // Lone element
            
            const r1_sub = diatomics.includes(pure.s) ? 2 : 1;
            const r2_form = makeFormula(c1, a1);
            display.innerHTML = format(`${pure.s}${r1_sub > 1 ? r1_sub : ''} + ${r2_form} → ???`);

            if (series.indexOf(pure.s) < series.indexOf(c1.s) && series.indexOf(pure.s) !== -1) {
                // Balancing Single Replacement: A + BC -> AC + B
                // Coefficients depend on charges and diatomics
                const p2_sub = diatomics.includes(c1.s) ? 2 : 1;
                const { sub1: ac_cat_sub, sub2: ac_ani_sub } = getSubscripts(pure.c, a1.c);
                const { sub1: bc_cat_sub, sub2: bc_ani_sub } = getSubscripts(c1.c, a1.c);

                // Simple balancing for A + B(sub)C(sub) -> A(sub)C(sub) + B
                let coeffA = 1, coeffBC = 1, coeffAC = 1, coeffB = 1;
                
                // Balance Anion first
                coeffAC = lcm(bc_ani_sub, ac_ani_sub) / ac_ani_sub;
                coeffBC = lcm(bc_ani_sub, ac_ani_sub) / bc_ani_sub;
                // Balance Cations
                coeffA = (coeffAC * ac_cat_sub) / r1_sub;
                coeffB = (coeffBC * bc_cat_sub) / p2_sub;

                // Cleanup if fractions occurred (rare in this simple set)
                const factor = lcm(lcm(coeffA, coeffBC), lcm(coeffAC, coeffB)) / gcd(lcm(coeffA, coeffBC), lcm(coeffAC, coeffB));
                // For simplicity in this UI, we ensure they are integers
                const finalA = coeffA == 1 ? '' : coeffA;
                const finalBC = coeffBC == 1 ? '' : coeffBC;
                const finalAC = coeffAC == 1 ? '' : coeffAC;
                const finalB = coeffB == 1 ? '' : coeffB;

                answer.innerHTML = "Balanced: " + format(`${finalAC}${makeFormula(pure, a1)} + ${finalB}${c1.s}${p2_sub > 1 ? p2_sub : ''}`);
            } else {
                answer.innerHTML = "Result: No Reaction (NR)";
            }
        } else {
            document.getElementById('mode-label').innerText = "Double Replacement";
            const c1 = cations[Math.floor(Math.random() * cations.length)];
            const a1 = anions[Math.floor(Math.random() * anions.length)];
            const c2 = cations[Math.floor(Math.random() * cations.length)];
            const a2 = anions[Math.floor(Math.random() * anions.length)];
            
            display.innerHTML = format(`${makeFormula(c1, a1)} + ${makeFormula(c2, a2)} → ???`);
            
            // Balancing Double Replacement: AB + CD -> AD + CB
            const { sub1: v1, sub2: v2 } = getSubscripts(c1.c, a1.c); // AB
            const { sub1: v3, sub2: v4 } = getSubscripts(c2.c, a2.c); // CD
            const { sub1: v5, sub2: v6 } = getSubscripts(c1.c, a2.c); // AD
            const { sub1: v7, sub2: v8 } = getSubscripts(c2.c, a1.c); // CB

            // Find coefficients using a simplified LCM approach for the ions
            const n1 = lcm(v1, v5) / v1; // Coeff for AB
            const n2 = lcm(v3, v7) / v3; // Coeff for CD
            const n3 = (n1 * v1) / v5;   // Coeff for AD
            const n4 = (n2 * v3) / v7;   // Coeff for CB

            answer.innerHTML = "Balanced: " + format(`${n3 == 1 ? '' : n3}${makeFormula(c1, a2)} + ${n4 == 1 ? '' : n4}${makeFormula(c2, a1)}`);
        }
    }

    function showAnswer() { document.getElementById('answer-display').classList.add('visible'); }
</script>
</body>
</html>
